[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax).
# No musl and no x86_64-apple-darwin: fastembed pulls prebuilt ONNX Runtime
# binaries, available only for gnu/darwin-arm64/msvc (ort 2.0.0-rc dropped Intel
# Mac). The CPU build stays the portable default (no gpu features).
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# ONNX Runtime prebuilts are compiled for the dynamic MSVC CRT (/MD): linking
# them against the static CRT (dist's default) fails with unresolved __imp_* symbols.
msvc-crt-static = false
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# cargo-dist resolves this path from .github/workflows/.
github-build-setup = "../dist/build-setup.yml"

# ONNX Runtime prebuilts need glibc >= 2.38 (__isoc23_*) and libstdc++ from
# GCC 13+ (__cxa_call_terminate): the default ubuntu-22.04 runners are too old.
[dist.github-custom-runners]
x86_64-unknown-linux-gnu = "ubuntu-24.04"
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"
